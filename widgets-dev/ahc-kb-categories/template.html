<div class="kc" ng-if="c.data.kbId">

  <!-- Section header -->
  <div class="kc__head" ng-if="c.data.kbName">
    <span class="kc__head-rule"></span>
    <h2 class="kc__head-title">{{::c.data.kbName}}</h2>
    <span class="kc__head-sub">Browse by category</span>
  </div>

  <!-- No articles -->
  <div class="kc__empty" ng-if="!c.data.categories.length">
    <i class="fa fa-folder-open-o" aria-hidden="true"></i>
    <p>No published articles yet.</p>
  </div>

  <!-- Category grid -->
  <div class="row kc__grid" ng-if="c.data.categories.length">
    <div class="col-xs-6 col-sm-4"
         ng-repeat="cat in c.data.categories track by cat.sys_id">
      <a class="kc__tile"
         ng-href="?id=ahc_kb_category&kb_category={{::cat.sys_id}}&kb_id={{::c.data.kbId}}"
         aria-label="{{::cat.label}}, {{::cat.count}} {{::cat.count === 1 ? 'article' : 'articles'}}">

        <!-- Colored cap with icon -->
        <div class="kc__cap" ng-style="{'background-color': c.accentFor($index)}">
          <i class="fa {{::c.iconFor(cat.label)}} kc__cap-ico" aria-hidden="true"></i>
        </div>

        <!-- Label + count -->
        <div class="kc__body">
          <h3 class="kc__name">{{::cat.label}}</h3>
          <span class="kc__count">
            {{::cat.count}} {{::cat.count === 1 ? 'article' : 'articles'}}
          </span>
          <span class="kc__arrow" aria-hidden="true"><i class="fa fa-arrow-right"></i></span>
        </div>

      </a>
    </div>
  </div>

</div>
